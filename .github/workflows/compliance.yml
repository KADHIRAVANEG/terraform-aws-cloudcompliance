name: SOC2 Compliance Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

   security-scan:
     name: Terraform Security Scan
     runs-on: ubuntu-latest
     needs: validate
     steps:
       - name: Checkout
         uses: actions/checkout@v4

       - name: Run Checkov
         uses: bridgecrewio/checkov-action@master
         with:
           directory: terraform/
           framework: terraform
           soft_fail: true
           output_format: cli


  compliance-check:
    name: SOC2 Compliance Check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install rich

      - name: Start LocalStack
        run: |
          docker run --rm -d \
            -p 4566:4566 \
            -p 4510-4559:4510-4559 \
            localstack/localstack:3.4.0
          echo "Waiting for LocalStack to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"s3"'; then
              echo "LocalStack is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 3
          done

      - name: Configure AWS CLI for LocalStack
        run: |
          pip install awscli-local
          aws configure set aws_access_key_id test
          aws configure set aws_secret_access_key test
          aws configure set default.region us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Deploy to LocalStack
        run: |
          cd terraform
          terraform init
          terraform apply -var-file="$(pwd)/local.tfvars" -auto-approve

      - name: Run Compliance Report
        run: python compliance/report.py

      - name: Check Compliance Score
        run: |
          python - <<'EOF'
          import json, sys
          with open('compliance/compliance_report.json') as f:
              report = json.load(f)
          score = report['compliance_score']
          print(f"SOC2 Compliance Score: {score}%")
          if score < 100:
              failing = [
                  cid for cid, ctrl in report['controls'].items()
                  if ctrl['status'] != 'PASS'
              ]
              print(f"Failing controls: {', '.join(failing)}")
              sys.exit(1)
          print("All SOC2 controls passing. Merge approved.")
          EOF

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compliance-report
          path: compliance/compliance_report.json
